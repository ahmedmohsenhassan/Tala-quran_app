name: tala_quran_app
description: A new Quran app with recitation and highlighting features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  just_audio: ^0.9.36
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  sqflite: ^2.3.0
  path: ^1.8.3
  dio: ^5.4.1
  archive: ^3.4.10
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/surahs/
    - assets/images/
    - assets/data/
    - assets/mushaf/
