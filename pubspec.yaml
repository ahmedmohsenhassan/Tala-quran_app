name: tala_quran_app
description: "Tala Quran: A premium, realistic 3D Quran experience with AI Tajweed analysis, recitation recognition, and smart notifications."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.2
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.1.18
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  sqflite: ^2.3.0
  path: ^1.8.3
  dio: ^5.4.1
  archive: ^3.4.10
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  vector_math: ^2.1.4
  wakelock_plus: ^1.5.1
  app_settings: ^7.0.0
  uuid: ^4.3.3
  flutter_downloader: ^1.11.6
  flutter_svg: ^2.0.10+1
  speech_to_text: ^7.3.0
  showcaseview: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A3326"
  image: "assets/images/logo.png"
  android_12:
    color: "#0A3326"
    image: "assets/images/logo.png"
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/surahs/
    - assets/images/
    - assets/data/
    - assets/mushaf/
    - assets/mushaf/data/
